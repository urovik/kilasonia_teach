# docker-compose.yml
version: '3.8'

services:
  kilasonia:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: kilasonia-app
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
      - TZ=Europe/Moscow
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "com.docker.compose.project=kilasonia"
      - "com.docker.compose.service=web"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Для стейджинга (опционально)
  kilasonia-staging:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=staging
    container_name: kilasonia-staging
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=staging
      - TZ=Europe/Moscow
    profiles:
      - staging

  # Для разработки (опционально)
  kilasonia-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: kilasonia-dev
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    environment:
      - NODE_ENV=development
    profiles:
      - dev